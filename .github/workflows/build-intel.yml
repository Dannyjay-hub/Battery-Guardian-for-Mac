name: Build Intel (x86_64) DMG

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload to (e.g. v1.3.2)'
        required: true

jobs:
  build-intel:
    runs-on: macos-13   # Intel Mac runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pywebview pyinstaller

      - name: Build app (x86_64)
        run: |
          python -m PyInstaller \
            --onedir --windowed \
            --icon=AppIcon.icns \
            --name "Battery Guardian" \
            --add-data "bg_template.html:." \
            --add-data "bg_guide.html:." \
            --add-data "ReadMeFirst.html:." \
            battery_guardian_web.py -y
          python -c "
          import platform
          import subprocess
          result = subprocess.run(['file', 'dist/Battery Guardian/Battery Guardian'], capture_output=True, text=True)
          print(result.stdout)
          "

      - name: Copy support files into app bundle
        run: |
          cp bg_template.html "dist/Battery Guardian/Battery Guardian.app/Contents/MacOS/" 2>/dev/null || true
          cp bg_guide.html "dist/Battery Guardian/Battery Guardian.app/Contents/MacOS/" 2>/dev/null || true
          cp ReadMeFirst.html "dist/Battery Guardian/Battery Guardian.app/Contents/MacOS/" 2>/dev/null || true

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Copy DMG background
        run: |
          mkdir -p dmg_staging
          cp -r "dist/Battery Guardian/Battery Guardian.app" dmg_staging/
          ln -s /Applications dmg_staging/Applications
          cp dmg_background.png dmg_staging/.background.png
          cp ReadMeFirst.html dmg_staging/

      - name: Create Intel DMG
        run: |
          create-dmg \
            --volname "Battery Guardian" \
            --background "dmg_staging/.background.png" \
            --window-pos 200 120 \
            --window-size 660 420 \
            --icon-size 100 \
            --icon "Battery Guardian.app" 180 280 \
            --icon "Applications" 480 280 \
            --hide-extension "Battery Guardian.app" \
            --app-drop-link 480 280 \
            "BatteryGuardian_v1.3.2_Intel.dmg" \
            "dmg_staging/" || true
          # Fallback: plain zip if create-dmg fails
          if [ ! -f "BatteryGuardian_v1.3.2_Intel.dmg" ]; then
            cd dist && zip -r "../BatteryGuardian_v1.3.2_Intel.dmg" "Battery Guardian/Battery Guardian.app"
          fi

      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name || github.event.inputs.tag }}"
          gh release upload "$TAG" "BatteryGuardian_v1.3.2_Intel.dmg" --clobber
